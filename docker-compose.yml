services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    profiles: ["object-storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    profiles: ["object-storage"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} && mc mb --ignore-existing local/${S3_BUCKET:-knowledge-base-uploads}",
      ]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-knowledge_base}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ZERO_COST_MODE: ${ZERO_COST_MODE:-true}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-128}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      TRANSFORMERS_SUMMARY_MODEL: ${TRANSFORMERS_SUMMARY_MODEL:-google/flan-t5-small}
      TRANSFORMERS_DEVICE: ${TRANSFORMERS_DEVICE:--1}
      HF_HOME: ${HF_HOME:-/app/model-cache}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/app/model-cache/transformers}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/app/model-cache/hub}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      FILE_STORAGE_DIR: /app/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge-base-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECURE_URLS: ${S3_SECURE_URLS:-false}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      MAX_DOCUMENT_CHARS: ${MAX_DOCUMENT_CHARS:-200000}
      ANALYSIS_EXECUTION_MODE: ${ANALYSIS_EXECUTION_MODE:-background}
      ANALYSIS_WORKER_POLL_SECONDS: ${ANALYSIS_WORKER_POLL_SECONDS:-2}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-30}
      RETURN_PASSWORD_RESET_TOKEN: ${RETURN_PASSWORD_RESET_TOKEN:-true}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_URL: redis://valkey:6379/0
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - model_cache:/app/model-cache
    depends_on:
      mongo:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
    profiles: ["worker"]
    restart: unless-stopped
    command: python -m app.worker
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-knowledge_base}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      ZERO_COST_MODE: ${ZERO_COST_MODE:-true}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-128}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      TRANSFORMERS_SUMMARY_MODEL: ${TRANSFORMERS_SUMMARY_MODEL:-google/flan-t5-small}
      TRANSFORMERS_DEVICE: ${TRANSFORMERS_DEVICE:--1}
      HF_HOME: ${HF_HOME:-/app/model-cache}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/app/model-cache/transformers}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/app/model-cache/hub}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      ANALYSIS_WORKER_POLL_SECONDS: ${ANALYSIS_WORKER_POLL_SECONDS:-2}
    volumes:
      - model_cache:/app/model-cache
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  ollama_data:
  backend_uploads:
  model_cache:
  valkey_data:
  minio_data:
  caddy_data:
  caddy_config:
